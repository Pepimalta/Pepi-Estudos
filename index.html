<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Pepi Estudos</title>

    <style>
        :root {
            --roxo: #6848f5;
            --roxo-escuro: #4930bc;
            --fundo: #f5f3ff;
            --branco: #ffffff;
            --texto: #242238;
            --cinza: #747287;
            --borda: #e5e0f5;
            --verde: #2fba80;
            --vermelho: #e95970;
            --sombra: 0 18px 50px rgba(64, 43, 150, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--fundo);
            color: var(--texto);
            font-family: Arial, Helvetica, sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .escondido {
            display: none !important;
        }

        /* AUTENTICAÇÃO */

        .pagina-autenticacao {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 25px;
            background:
                radial-gradient(
                    circle at top left,
                    #d8d0ff,
                    transparent 35%
                ),
                radial-gradient(
                    circle at bottom right,
                    #c9f8ff,
                    transparent 35%
                ),
                var(--fundo);
        }

        .cartao-autenticacao {
            width: min(460px, 100%);
            padding: 38px;
            border-radius: 28px;
            background: var(--branco);
            box-shadow: var(--sombra);
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 11px;
            margin-bottom: 28px;
        }

        .logo-simbolo {
            display: grid;
            width: 48px;
            height: 48px;
            place-items: center;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--roxo), #38c4d7);
            color: var(--branco);
            font-size: 23px;
            font-weight: bold;
        }

        .logo strong {
            font-size: 23px;
        }

        .cartao-autenticacao h1 {
            margin: 0 0 10px;
            font-size: 30px;
        }

        .subtitulo {
            margin: 0 0 27px;
            color: var(--cinza);
            line-height: 1.5;
        }

        .botao-principal,
        .botao-secundario {
            width: 100%;
            border-radius: 14px;
            padding: 13px 18px;
            font-weight: bold;
        }

        .botao-principal {
            border: none;
            background: var(--roxo);
            color: var(--branco);
        }

        .botao-principal:hover {
            background: var(--roxo-escuro);
        }

        .botao-secundario {
            border: 2px solid var(--roxo);
            background: var(--branco);
            color: var(--roxo);
        }

        .ou {
            margin: 14px 0;
            color: var(--cinza);
        }

        .formulario {
            text-align: left;
        }

        .formulario h1,
        .formulario .subtitulo {
            text-align: center;
        }

        .formulario label {
            display: block;
            margin: 15px 0 7px;
            font-weight: bold;
        }

        .formulario input[type="text"],
        .formulario input[type="email"],
        .formulario input[type="password"] {
            width: 100%;
            border: 2px solid var(--borda);
            border-radius: 13px;
            padding: 13px;
            outline: none;
        }

        .formulario input:focus {
            border-color: var(--roxo);
        }

        .campo-senha {
            display: flex;
            gap: 7px;
        }

        .campo-senha input {
            flex: 1;
        }

        .mostrar-senha {
            width: 48px;
            border: none;
            border-radius: 13px;
            background: #eeeaff;
        }

        .tipos-conta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0 20px;
        }

        .tipos-conta label {
            margin: 0;
            border: 2px solid var(--borda);
            border-radius: 13px;
            padding: 12px;
            text-align: center;
        }

        .voltar-autenticacao {
            display: block;
            margin: 17px auto 0;
            border: none;
            background: transparent;
            color: var(--roxo);
            font-weight: bold;
        }

        .mensagem {
            min-height: 20px;
            margin-bottom: 0;
            color: var(--vermelho);
            text-align: center;
            font-weight: bold;
        }

        /* APLICATIVO */

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 17px 6%;
            background: var(--branco);
            box-shadow: 0 4px 18px rgba(64, 43, 150, 0.08);
        }

        .logo-cabecalho {
            display: flex;
            align-items: center;
            gap: 9px;
            border: none;
            background: transparent;
            color: var(--texto);
            font-size: 20px;
            font-weight: bold;
        }

        .logo-cabecalho .logo-simbolo {
            width: 40px;
            height: 40px;
            font-size: 19px;
        }

        .area-perfil {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #botao-conta {
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            background: #eeeaff;
            color: var(--roxo);
            font-weight: bold;
        }

        .conteudo {
            width: min(1100px, 92%);
            margin: 35px auto 70px;
            text-align: center;
        }

        .apresentacao {
            padding: 35px;
            border-radius: 28px;
            background: linear-gradient(125deg, var(--roxo), #9477ff);
            color: var(--branco);
            box-shadow: var(--sombra);
        }

        .apresentacao h1 {
            margin: 0 0 9px;
            font-size: 34px;
        }

        .apresentacao p {
            margin: 0;
            line-height: 1.5;
        }

        .pesquisa {
            width: min(720px, 100%);
            margin: 24px auto;
            padding: 18px;
            border-radius: 18px;
            background: var(--branco);
            box-shadow: var(--sombra);
        }

        .pesquisa label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .linha-pesquisa {
            display: flex;
            gap: 8px;
        }

        .linha-pesquisa input {
            flex: 1;
            min-width: 0;
            border: 2px solid var(--borda);
            border-radius: 12px;
            padding: 12px;
            outline: none;
        }

        .linha-pesquisa button {
            border: none;
            border-radius: 12px;
            padding: 10px 17px;
            background: var(--roxo);
            color: var(--branco);
            font-weight: bold;
        }

        .titulo-materias {
            margin: 35px 0 18px;
        }

        .titulo-materias h2 {
            margin-bottom: 5px;
            font-size: 28px;
        }

        .titulo-materias p {
            color: var(--cinza);
        }

        .materias {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 17px;
            justify-content: center;
        }

        .materia {
            display: flex;
            min-height: 180px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            border-radius: 22px;
            padding: 20px;
            background: var(--branco);
            color: var(--texto);
            box-shadow: var(--sombra);
            transition: 0.2s;
        }

        .materia:hover {
            transform: translateY(-5px);
            border-color: var(--roxo);
        }

        .materia span {
            margin-bottom: 14px;
            font-size: 38px;
        }

        .materia strong {
            margin-bottom: 6px;
            font-size: 19px;
        }

        .materia small {
            color: var(--cinza);
        }

        /* PÁGINA DA MATÉRIA */

        .voltar {
            display: block;
            margin-bottom: 20px;
            border: none;
            border-radius: 12px;
            padding: 11px 15px;
            background: #eeeaff;
            color: var(--roxo);
            font-weight: bold;
        }

        .cabecalho-materia {
            padding: 30px;
            border-radius: 24px;
            background: var(--branco);
            box-shadow: var(--sombra);
        }

        .cabecalho-materia h1 {
            margin: 5px 0;
            font-size: 32px;
        }

        .opcoes-materia {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 22px 0;
        }

        .opcoes-materia button {
            border: none;
            border-radius: 15px;
            padding: 15px 10px;
            background: var(--roxo);
            color: var(--branco);
            font-weight: bold;
        }

        .area-dinamica {
            padding: 25px;
            border-radius: 22px;
            background: var(--branco);
            box-shadow: var(--sombra);
        }

        .tipos-explicacao {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 13px;
            margin-top: 20px;
        }

        .tipos-explicacao button {
            border: 2px solid var(--borda);
            border-radius: 16px;
            padding: 20px;
            background: var(--branco);
            color: var(--texto);
        }

        .tipos-explicacao span {
            display: block;
            margin-bottom: 8px;
            font-size: 30px;
        }

        .upload {
            display: inline-block;
            margin: 15px;
            border: 2px dashed var(--roxo);
            border-radius: 15px;
            padding: 20px;
            color: var(--roxo);
            font-weight: bold;
            cursor: pointer;
        }

        .arquivo {
            margin: 10px auto;
            border: 1px solid var(--borda);
            border-radius: 12px;
            padding: 12px;
            text-align: left;
        }

        .alternativa {
            display: block;
            width: min(650px, 100%);
            margin: 10px auto;
            border: 2px solid var(--borda);
            border-radius: 13px;
            padding: 13px;
            background: var(--branco);
        }

        .alternativa.correta {
            border-color: var(--verde);
            background: #eafff5;
        }

        .alternativa.errada {
            border-color: var(--vermelho);
            background: #fff0f3;
        }

        /* MINHA CONTA */

        .fundo-modal {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(28, 22, 58, 0.55);
        }

            padding:
